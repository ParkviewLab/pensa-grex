version = 1

# Documentation and prose — Creative Commons Attribution 4.0 International.
[[annotations]]
path = ["README.md", "LICENSING.md", "CHANGELOG.md", "AGENTS.md", "CLAUDE.md", "docs/**"]
SPDX-FileCopyrightText = "2026 Gary Frattarola <garyf@parkviewlab.ai>"
SPDX-License-Identifier = "CC-BY-4.0"

# Project config, manifests, lockfiles, CI workflows and scripts — AGPL-3.0-or-later.
# (JSON/dotfiles/YAML cannot carry comment headers; the lockfile is generated;
# cliff.toml and scripts/generate_changelog.py are mirrored verbatim from the handbook.)
[[annotations]]
path = [
  ".gitignore",
  "package.json",
  "package-lock.json",
  "cliff.toml",
  "scripts/**",
  ".github/**",
  "electron-builder.yml",
]
SPDX-FileCopyrightText = "2026 Gary Frattarola <garyf@parkviewlab.ai>"
SPDX-License-Identifier = "AGPL-3.0-or-later"

# Vitest test files — AGPL-3.0-or-later. These carry the same inline SPDX header
# as the rest of src/**, but their punctuation-dense input arrays make
# charset-normalizer (reuse's encoding detector in CI) misread the file and miss
# the header, failing the lint non-deterministically. Asserting the licence here
# makes compliance independent of the encoding heuristic; the inline headers stay.
[[annotations]]
path = ["src/**/*.test.js"]
SPDX-FileCopyrightText = "2026 Gary Frattarola <garyf@parkviewlab.ai>"
SPDX-License-Identifier = "AGPL-3.0-or-later"

# Bundled typefaces — SIL Open Font License 1.1. woff2 are binary and cannot carry
# an inline SPDX header, so they are annotated here (as the binary/JSON files above
# are). Copyright lines are taken verbatim from each font's google/fonts METADATA.
[[annotations]]
path = [
  "src/renderer/src/assets/fonts/LeagueSpartan-latin.woff2",
  "src/renderer/src/assets/fonts/LeagueSpartan-latin-ext.woff2",
]
SPDX-FileCopyrightText = "Copyright 2020 The League Spartan Project Authors (https://github.com/theleagueof/league-spartan)"
SPDX-License-Identifier = "OFL-1.1"

[[annotations]]
path = ["src/renderer/src/assets/fonts/Boogaloo-latin.woff2"]
SPDX-FileCopyrightText = 'Copyright (c) 2011, John Vargas Beltran (www.johnvargasbeltran.com|john.vargasbeltran@gmail.com), with Reserved Font Name "Boogaloo".'
SPDX-License-Identifier = "OFL-1.1"

# App icon — PensaGrex atomic-age mark (a three-orbit atom over a Googie task
# screen), all rights reserved. icon.svg (azure/day) is the regen source and is
# what electron-builder expands into the platform .icns/.ico/PNG; icon.png (1024²)
# is rendered from it; icon-night.svg is the navy alternate, kept for future use.
[[annotations]]
path = ["build/icon.png", "build/icon.svg", "build/icon-night.svg"]
SPDX-FileCopyrightText = "2026 Gary Frattarola <garyf@parkviewlab.ai>"
SPDX-License-Identifier = "LicenseRef-AllRightsReserved"
