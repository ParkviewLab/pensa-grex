version = 1

# Documentation and prose — Creative Commons Attribution 4.0 International.
[[annotations]]
path = ["README.md", "LICENSING.md", "CHANGELOG.md", "AGENTS.md", "CLAUDE.md", "docs/**"]
SPDX-FileCopyrightText = "2026 Gary Frattarola <garycoding@gmail.com>"
SPDX-License-Identifier = "CC-BY-4.0"

# Project config, manifests, lockfiles, CI workflows and scripts — AGPL-3.0-or-later.
# (JSON/dotfiles/YAML cannot carry comment headers; the lockfile is generated;
# cliff.toml and scripts/generate_changelog.py are mirrored verbatim from the handbook.)
[[annotations]]
path = [
  ".gitignore",
  "package.json",
  "package-lock.json",
  "cliff.toml",
  "scripts/**",
  ".github/**",
  "electron-builder.yml",
]
SPDX-FileCopyrightText = "2026 Gary Frattarola <garycoding@gmail.com>"
SPDX-License-Identifier = "AGPL-3.0-or-later"

# Vitest test files — AGPL-3.0-or-later. These carry the same inline SPDX header
# as the rest of src/**, but their punctuation-dense input arrays make
# charset-normalizer (reuse's encoding detector in CI) misread the file and miss
# the header, failing the lint non-deterministically. Asserting the licence here
# makes compliance independent of the encoding heuristic; the inline headers stay.
[[annotations]]
path = ["src/**/*.test.js"]
SPDX-FileCopyrightText = "2026 Gary Frattarola <garycoding@gmail.com>"
SPDX-License-Identifier = "AGPL-3.0-or-later"
