name: Test

# Electron-app CI — lint, unit tests, and a build smoke-test. PensaGrex is
# plain JavaScript (no TypeScript), so there is no typecheck tier; the pure
# model/layout modules are unit-tested with Vitest as of M2. See the
# handbook's ci.md / node-tooling.md.

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: 24.x
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build (electron-vite)
        run: npm run build
