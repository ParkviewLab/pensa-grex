name: Deploy download page

# Publishes site/ to GitHub Pages at https://parkviewlab.github.io/pensa-grex/.
# Decoupled from app releases: any change under site/ on develop redeploys. The
# download links are populated at runtime from the latest GitHub Release, so the
# page itself rarely needs a redeploy.

on:
  push:
    branches: [develop]
    paths:
      - 'site/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v5
