# electron-builder — packages the electron-vite build (out/) into platform
# installers: .dmg (macOS), NSIS .exe (Windows), .AppImage + .deb (Linux).
# Run after `npm run build`. macOS is signed (Developer ID Application) and
# notarized; Windows and Linux ship unsigned (Windows SmartScreen may warn on
# first launch). See the handbook's electron-tooling.md.
appId: ai.parkviewlab.pensa-grex
productName: PensaGrex
artifactName: ${name}-${version}-${arch}.${ext}
directories:
  output: dist
  buildResources: build
files:
  - '!src/**'
  - '!docs/**'
  - '!scripts/**'
  - '!.github/**'
  - '!LICENSES/**'
  - '!{electron.vite.config.js,eslint.config.mjs,electron-builder.yml,cliff.toml,REUSE.toml,LICENSING.md,CHANGELOG.md,README.md,AGENTS.md,CLAUDE.md,.gitignore}'
mac:
  category: public.app-category.productivity
  target: dmg
  hardenedRuntime: true
  # Signed with a Developer ID Application cert (CSC_LINK / CSC_KEY_PASSWORD) and
  # notarized via an App Store Connect API key (APPLE_API_KEY / _ID / _ISSUER),
  # wired in release-electron.yml's macOS job. Notarization activates from those
  # env vars; electron-builder applies its default Electron entitlements under the
  # hardened runtime, so no custom entitlements plist is needed.
win:
  target: nsis
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  oneClick: false
  allowToChangeInstallationDirectory: true
  shortcutName: ${productName}
linux:
  target:
    - AppImage
    - deb
  category: Utility
  maintainer: Gary Frattarola <garyf@parkviewlab.ai>
npmRebuild: false
# Ship the generated license/notice bundle (run `npm run legal` first; build:dist
# does this before packaging). electron-builder deletes LICENSES.chromium.html
# from the mac .app, so legal/ carries our own copy → one stable path on all
# OSes: process.resourcesPath/legal at runtime. See scripts/prepare-legal.mjs.
extraResources:
  - from: legal
    to: legal
    filter: ['**/*']
publish:
  provider: github
  owner: ParkviewLab
  repo: pensa-grex
