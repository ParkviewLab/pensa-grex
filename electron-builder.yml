# electron-builder — packages the electron-vite build (out/) into platform
# installers: .dmg (macOS), NSIS .exe (Windows), .AppImage + .deb (Linux).
# Run after `npm run build`. Unsigned for now — macOS Gatekeeper and Windows
# SmartScreen will warn on first launch until signing is wired up (see the
# handbook's electron-tooling.md for how to add it later).
appId: ai.parkviewlab.pensa-grex
productName: PensaGrex
artifactName: ${name}-${version}-${arch}.${ext}
directories:
  output: dist
  buildResources: build
files:
  - '!src/**'
  - '!docs/**'
  - '!scripts/**'
  - '!.github/**'
  - '!LICENSES/**'
  - '!{electron.vite.config.js,eslint.config.mjs,electron-builder.yml,cliff.toml,REUSE.toml,LICENSING.md,CHANGELOG.md,README.md,AGENTS.md,CLAUDE.md,.gitignore}'
mac:
  category: public.app-category.productivity
  target: dmg
win:
  target: nsis
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  oneClick: false
  allowToChangeInstallationDirectory: true
  shortcutName: ${productName}
linux:
  target:
    - AppImage
    - deb
  category: Utility
  maintainer: Gary Frattarola <garyf@parkviewlab.ai>
npmRebuild: false
# Ship the generated license/notice bundle (run `npm run legal` first; build:dist
# does this before packaging). electron-builder deletes LICENSES.chromium.html
# from the mac .app, so legal/ carries our own copy → one stable path on all
# OSes: process.resourcesPath/legal at runtime. See scripts/prepare-legal.mjs.
extraResources:
  - from: legal
    to: legal
    filter: ['**/*']
publish:
  provider: github
  owner: ParkviewLab
  repo: pensa-grex
