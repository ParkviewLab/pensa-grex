<html lang="en" data-ground="azure">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TaskForkStack</title>
  <link rel="stylesheet" href="./src/style.css">
</head>
<body>
  <div id="app">
    <header class="topbar">
      <div class="tb-left">
        <span class="brand">TaskForkStack</span>
        <select class="domain" id="domain" title="Domain" aria-label="Domain"></select>
      </div>
      <div class="tb-right">
        <span class="seglbl">Mode</span>
        <div class="seg" id="mode">
          <button data-g="azure" class="on">Light</button>
          <button data-g="navy">Dark</button>
        </div>
        <div class="zoom">
          <button class="btn icon" id="zout" title="Zoom out" aria-label="Zoom out">&minus;</button>
          <span class="pct" id="pct">100%</span>
          <button class="btn icon" id="zin" title="Zoom in" aria-label="Zoom in">+</button>
          <button class="btn primary" id="fit">Fit</button>
        </div>
      </div>
    </header>
    <div class="viewport" id="viewport">
      <div class="world" id="world"><div class="content" id="content"></div></div>
      <div class="empty" id="empty">No forest open yet</div>
    </div>
  </div>
  <script type="module" src="./src/app.js"></script>
</body>
</html>
